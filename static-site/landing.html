<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智识笔记 - SmartKnowledge</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .landing-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .landing-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .landing-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .landing-logo svg {
            width: 24px;
            height: 24px;
        }

        .landing-nav {
            display: flex;
            gap: 24px;
        }

        .landing-nav a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .landing-nav a:hover {
            color: #fff;
        }

        .landing-actions {
            display: flex;
            gap: 12px;
        }

        .landing-content {
            text-align: center;
            max-width: 800px;
            margin-top: 60px;
        }

        .landing-title {
            font-size: 52px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .landing-subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .landing-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 60px;
        }

        .landing-btn-primary {
            background: #00d4ff;
            color: #000;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
        }

        .landing-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        }

        .landing-btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .landing-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .landing-features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1000px;
            width: 100%;
        }

        .feature-card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .feature-card:hover {
            transform: translateY(-4px);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-icon.blue {
            background: rgba(0, 212, 255, 0.15);
        }

        .feature-icon.green {
            background: rgba(74, 222, 128, 0.15);
        }

        .feature-icon.purple {
            background: rgba(165, 180, 252, 0.15);
        }

        .feature-icon svg {
            width: 24px;
            height: 24px;
        }

        .feature-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .feature-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }

        .landing-footer {
            margin-top: 60px;
            padding: 24px 0;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="landing-header">
        <a href="landing.html" class="landing-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <span>智识笔记</span>
        </a>
        <div class="landing-nav">
            <a href="#features">功能特性</a>
            <a href="#about">关于我们</a>
            <a href="#contact">联系我们</a>
        </div>
        <div class="landing-actions">
            <button class="landing-btn-secondary" onclick="window.location.href='login.html'">登录</button>
            <button class="landing-btn-primary" onclick="window.location.href='register.html'">注册</button>
        </div>
    </div>

    <div class="landing-page">
        <div class="landing-content">
            <h1 class="landing-title">知识管理，从此简单</h1>
            <p class="landing-subtitle">智识笔记帮助你高效整理、快速检索、深度关联知识，让每一次学习都有价值</p>
            <div class="landing-buttons">
                <button class="landing-btn-primary" onclick="window.location.href='register.html'">免费开始</button>
                <button class="landing-btn-secondary" onclick="window.location.href='login.html'">已有账号？登录</button>
            </div>
        </div>

        <div class="landing-features" id="features">
            <div class="feature-card">
                <div class="feature-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                <h3 class="feature-title">智能笔记</h3>
                <p class="feature-description">支持 Markdown 格式，实时预览，让你的笔记更加清晰美观</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon green">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <h3 class="feature-title">快速检索</h3>
                <p class="feature-description">强大的搜索功能，支持关键词匹配，瞬间找到你需要的知识</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon purple">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                    </svg>
                </div>
                <h3 class="feature-title">知识图谱</h3>
                <p class="feature-description">可视化展示知识关联，发现隐藏的知识网络</p>
            </div>
        </div>

        <div class="landing-footer">
            <p>© 2024 智识笔记 - SmartKnowledge. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
