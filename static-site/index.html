<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智识笔记 - SmartKnowledge</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-left">
            <a href="#" class="logo" onclick="navigateTo('home'); return false;">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span>智识笔记</span>
            </a>
        </div>
        <div class="header-center">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" placeholder="搜索知识点..." id="globalSearch">
                <button class="btn btn-primary search-btn" onclick="handleGlobalSearch()">搜索</button>
            </div>
        </div>
        <div class="header-right">
            <button class="btn btn-default btn-icon" onclick="navigateTo('home')" title="首页">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <button class="btn btn-default btn-icon" onclick="navigateTo('import')" title="导入">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </button>
            <button class="btn btn-default btn-icon" onclick="navigateTo('settings')" title="设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <div class="user-avatar" onclick="toggleUserMenu()" style="background-image: url('img/mmexport1779292180713.jpg'); background-size: cover; background-position: center;"></div>
        </div>
    </header>

    <!-- 用户菜单 -->
    <div id="userMenu" style="display: none; position: absolute; right: 20px; top: 70px; background: white; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); padding: 8px; min-width: 150px; z-index: 1001;">
        <div style="padding: 8px 12px; cursor: pointer;" onclick="navigateTo('settings'); toggleUserMenu();">个人设置</div>
        <div style="padding: 8px 12px; cursor: pointer;" onclick="navigateTo('category'); toggleUserMenu();">分类管理</div>
        <div style="padding: 8px 12px; cursor: pointer;" onclick="navigateTo('tag'); toggleUserMenu();">标签管理</div>
        <div style="padding: 8px 12px; cursor: pointer;" onclick="navigateTo('help'); toggleUserMenu();">帮助指南</div>
        <div style="border-top: 1px solid #ebeef5; padding: 8px 12px; cursor: pointer; color: #f56c6c;" onclick="toggleUserMenu();">退出登录</div>
    </div>

    <!-- 主体容器 -->
    <div class="main-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-title">导航</div>
                    <div class="nav-item" onclick="navigateTo('home')" id="nav-home" data-title="首页">
                        <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span class="nav-item-text">首页</span>
                    </div>
                    <div class="nav-item" onclick="navigateTo('knowledge')" id="nav-knowledge" data-title="知识点">
                        <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        <span class="nav-item-text">知识点</span>
                    </div>
                    <div class="nav-item" onclick="navigateTo('search')" id="nav-search" data-title="搜索">
                        <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <span class="nav-item-text">搜索</span>
                    </div>
                    <div class="nav-item" onclick="navigateTo('graph')" id="nav-graph" data-title="知识图谱">
                        <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                        </svg>
                        <span class="nav-item-text">知识图谱</span>
                    </div>
                </div>
                <div class="nav-section">
                    <div class="nav-title">分类</div>
                    <div id="categoryNav"></div>
                </div>
                <div class="nav-section quick-actions">
                    <div class="nav-title">快捷操作</div>
                    <button class="btn btn-primary action-btn" onclick="navigateTo('create')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        新建知识点
                    </button>
                    <button class="btn btn-default action-btn" onclick="navigateTo('import')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        导入文件
                    </button>
                </div>
            </nav>
        </aside>

        <!-- 内容区域 -->
        <main class="content" id="content">
            <!-- 页面内容将通过 JavaScript 动态渲染 -->
        </main>
    </div>

    <!-- 回到顶部按钮 -->
    <div class="back-to-top" id="backToTop" onclick="scrollToTop()" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </div>

    <!-- 模态框 -->
    <div id="modal" class="modal-overlay" style="display: none;" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">标题</span>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- 引入 Mock 数据 -->
    <script src="data/mockData.js"></script>
    <!-- 引入 Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        // 当前页面
        let currentPage = 'home';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderPage('home');
            renderCategoryNav();
            setupEventListeners();
            updateNavActive('home');
        });

        // 设置事件监听
        function setupEventListeners() {
            // 全局搜索
            document.getElementById('globalSearch').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const keyword = e.target.value.trim();
                    if (keyword) {
                        navigateTo('search', { keyword });
                    }
                }
            });

            // 滚动监听
            window.addEventListener('scroll', () => {
                const backToTop = document.getElementById('backToTop');
                backToTop.style.display = window.scrollY > 300 ? 'flex' : 'none';
            });
        }

        // 全局搜索按钮点击
        function handleGlobalSearch() {
            const keyword = document.getElementById('globalSearch').value.trim();
            if (keyword) {
                navigateTo('search', { keyword });
            } else {
                alert('请输入搜索关键词');
            }
        }

        // 导航到页面
        function navigateTo(page, params = {}) {
            currentPage = page;
            renderPage(page, params);
            updateNavActive(page);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('userMenu').style.display = 'none';
        }

        // 更新导航激活状态
        function updateNavActive(page) {
            const navItems = ['home', 'knowledge', 'search', 'graph'];
            navItems.forEach(item => {
                const el = document.getElementById('nav-' + item);
                if (el) {
                    el.classList.remove('active');
                }
            });
            
            if (navItems.includes(page)) {
                const el = document.getElementById('nav-' + page);
                if (el) el.classList.add('active');
            }
        }

        // 切换用户菜单
        function toggleUserMenu() {
            const menu = document.getElementById('userMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        // 点击外部关闭菜单
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('userMenu');
            if (menu.style.display === 'block' && !e.target.closest('.user-avatar') && !e.target.closest('#userMenu')) {
                menu.style.display = 'none';
            }
        });

        // 回到顶部
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 渲染分类导航
        function renderCategoryNav() {
            const container = document.getElementById('categoryNav');
            let html = '';
            
            mockData.categories.forEach(cat => {
                html += `
                    <div class="nav-item" onclick="navigateTo('knowledge', { categoryId: ${cat.id} })" data-title="${cat.name}">
                        <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span class="nav-item-text">${cat.name}</span>
                    </div>
                `;
                if (cat.children && cat.children.length > 0) {
                    cat.children.forEach(child => {
                        html += `
                            <div class="nav-item sub-nav-item" onclick="navigateTo('knowledge', { categoryId: ${child.id} })" data-title="${child.name}">
                                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                </svg>
                                <span class="nav-item-text">${child.name}</span>
                            </div>
                        `;
                    });
                }
            });
            
            container.innerHTML = html;
        }

        // 渲染页面
        function renderPage(page, params = {}) {
            const content = document.getElementById('content');
            
            switch (page) {
                case 'home':
                    content.innerHTML = renderHome();
                    break;
                case 'knowledge':
                    content.innerHTML = renderKnowledgeList(params);
                    break;
                case 'detail':
                    content.innerHTML = renderKnowledgeDetail(params);
                    break;
                case 'create':
                    content.innerHTML = renderCreateKnowledge();
                    break;
                case 'search':
                    content.innerHTML = renderSearch(params);
                    break;
                case 'graph':
                    content.innerHTML = renderGraph();
                    break;
                case 'category':
                    content.innerHTML = renderCategoryManage();
                    break;
                case 'tag':
                    content.innerHTML = renderTagManage();
                    break;
                case 'import':
                    content.innerHTML = renderImport();
                    break;
                case 'settings':
                    content.innerHTML = renderSettings();
                    break;
                case 'help':
                    content.innerHTML = renderHelp();
                    break;
                default:
                    content.innerHTML = renderHome();
            }
        }

        // 渲染首页
        function renderHome() {
            const stats = {
                knowledgeCount: mockData.knowledge.length,
                categoryCount: mockData.categories.length,
                tagCount: mockData.tags.length,
                week新增: 3
            };
            
            const recentKnowledge = mockData.knowledge.slice(0, 6);
            
            return `
                <div class="home-container">
                    <div class="welcome-section">
                        <h1>欢迎回来，用户</h1>
                        <p>这里是您的知识管理中心</p>
                    </div>
                    <div class="stats-grid">
                        <div class="card stat-card">
                            <div class="stat-content">
                                <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#409eff" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                </svg>
                                <div class="stat-info">
                                    <div class="stat-value">${stats.knowledgeCount}</div>
                                    <div class="stat-label">知识点总数</div>
                                </div>
                            </div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-content">
                                <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#67c23a" stroke-width="2">
                                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                                </svg>
                                <div class="stat-info">
                                    <div class="stat-value">${stats.categoryCount}</div>
                                    <div class="stat-label">分类数量</div>
                                </div>
                            </div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-content">
                                <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#e6a23c" stroke-width="2">
                                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                </svg>
                                <div class="stat-info">
                                    <div class="stat-value">${stats.tagCount}</div>
                                    <div class="stat-label">标签数量</div>
                                </div>
                            </div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-content">
                                <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#f56c6c" stroke-width="2">
                                    <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                                    <polyline points="16 7 22 7 22 13"></polyline>
                                </svg>
                                <div class="stat-info">
                                    <div class="stat-value">${stats.week新增}</div>
                                    <div class="stat-label">本周新增</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="card-header">
                            <span class="card-title">最近知识点</span>
                            <button class="btn btn-default" onclick="navigateTo('knowledge')">
                                查看全部
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                        <div class="knowledge-grid">
                            ${recentKnowledge.map(k => renderKnowledgeCard(k)).join('')}
                        </div>
                    </div>
                    <div class="section">
                        <div class="card-header">
                            <span class="card-title">快速操作</span>
                        </div>
                        <div class="knowledge-grid">
                            <div class="card knowledge-card" onclick="navigateTo('create')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#409eff" stroke-width="2" width="48" height="48">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                <span style="font-size: 16px; color: rgba(255, 255, 255, 0.85);">新建知识点</span>
                            </div>
                            <div class="card knowledge-card" onclick="navigateTo('import')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#67c23a" stroke-width="2" width="48" height="48">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <span style="font-size: 16px; color: rgba(255, 255, 255, 0.85);">导入文件</span>
                            </div>
                            <div class="card knowledge-card" onclick="navigateTo('graph')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#e6a23c" stroke-width="2" width="48" height="48">
                                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                                </svg>
                                <span style="font-size: 16px; color: rgba(255, 255, 255, 0.85);">知识图谱</span>
                            </div>
                            <div class="card knowledge-card" onclick="navigateTo('search')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#f56c6c" stroke-width="2" width="48" height="48">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                                <span style="font-size: 16px; color: rgba(255, 255, 255, 0.85);">搜索知识</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染知识点卡片
        function renderKnowledgeCard(k) {
            const category = findCategory(k.categoryId);
            const tags = k.tagIds.map(id => findTag(id)).filter(Boolean);
            
            return `
                <div class="card knowledge-card" onclick="navigateTo('detail', { id: ${k.id} })">
                    <div class="knowledge-card-header">
                        <span class="knowledge-card-title">${k.title}</span>
                    </div>
                    <div class="knowledge-card-summary">${k.summary}</div>
                    <div class="knowledge-card-tags">
                        ${tags.map(t => `<span class="tag" style="background: ${t.color}">${t.name}</span>`).join('')}
                    </div>
                    <div class="knowledge-card-meta">
                        <span class="category-tag">
                            <svg class="category-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            </svg>
                            ${category ? category.name : '未分类'}
                        </span>
                        <span>${formatDate(k.createTime)}</span>
                    </div>
                </div>
            `;
        }

        // 渲染知识点列表
        function renderKnowledgeList(params = {}) {
            let knowledge = [...mockData.knowledge];
            
            // 筛选
            if (params.categoryId) {
                knowledge = knowledge.filter(k => k.categoryId === params.categoryId);
            }
            
            // 排序
            knowledge.sort((a, b) => new Date(b.createTime) - new Date(a.createTime));
            
            return `
                <div class="knowledge-list-container">
                    <div class="toolbar">
                        <div class="toolbar-left">
                            <div class="select-wrapper">
                                <select class="select-input" id="viewMode" onchange="renderPage('knowledge', ${JSON.stringify(params)})">
                                    <option value="card">卡片视图</option>
                                    <option value="list">列表视图</option>
                                </select>
                            </div>
                            <div class="select-wrapper">
                                <select class="select-input" id="filterCategory">
                                    <option value="">全部分类</option>
                                    ${mockData.categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('')}
                                </select>
                            </div>
                            <div class="select-wrapper">
                                <select class="select-input" id="filterTag">
                                    <option value="">全部标签</option>
                                    ${mockData.tags.map(tag => `<option value="${tag.id}">${tag.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="toolbar-right">
                            <button class="btn btn-primary" onclick="navigateTo('create')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                新建知识点
                            </button>
                        </div>
                    </div>
                    <div class="knowledge-grid">
                        ${knowledge.map(k => renderKnowledgeCard(k)).join('')}
                    </div>
                    ${knowledge.length === 0 ? '<div class="empty-state">暂无知识点</div>' : ''}
                </div>
            `;
        }

        // 渲染知识点详情

        // 辅助函数：查找分类
        function findCategory(id) {
            if (!id) return null;
            for (const cat of mockData.categories) {
                if (cat.id === id) return cat;
                if (cat.children) {
                    const found = cat.children.find(c => c.id === id);
                    if (found) return found;
                }
            }
            return null;
        }

        // 辅助函数：查找标签
        function findTag(id) {
            return mockData.tags.find(t => t.id === id);
        }

        // 辅助函数：格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }
